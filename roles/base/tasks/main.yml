---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install base utilities
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - htop
      - ufw
    state: present

- name: Allow SSH through UFW before enabling
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW with default deny
  community.general.ufw:
    state: enabled
    policy: deny

- name: Install fail2ban
  ansible.builtin.package:
    name: fail2ban
    state: present

- name: Enable and start fail2ban via systemctl
  ansible.builtin.command: systemctl enable --now fail2ban
  changed_when: false
